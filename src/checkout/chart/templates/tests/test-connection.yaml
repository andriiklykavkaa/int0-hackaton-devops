apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "checkout.fullname" . }}-test-connection"
  labels:
    {{- include "checkout.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['-qO-', '{{ include "checkout.fullname" . }}:{{ .Values.service.port }}/health']
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
  restartPolicy: Never
