apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-stage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/andriiklykavkaa/int0-hackaton-devops.git
    targetRevision: main
    path: src/checkout/chart
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.repository
          value: europe-central2-docker.pkg.dev/PROJECT_ID/retail-images/retail-store-sample-checkout
        - name: image.tag
          value: c687f12   # CI updates this to git SHA on merge
        - name: autoscaling.enabled
          value: "true"
        - name: autoscaling.minReplicas
          value: "1"
        - name: autoscaling.maxReplicas
          value: "5"
        - name: metrics.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: retail-store-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
