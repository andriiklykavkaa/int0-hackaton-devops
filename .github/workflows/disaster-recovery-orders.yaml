name: Orders PostgreSQL Disaster Recovery

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Backup only or backup plus restore validation"
        required: true
        default: backup-and-restore
        type: choice
        options:
          - backup-and-restore
          - backup-only
      namespace:
        description: "Target namespace"
        required: true
        default: retail-store-stage
        type: string
      validation_db:
        description: "Scratch database used for restore validation"
        required: true
        default: orders_restore_validation
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  orders-postgres-dr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: squad-ecommerce-stage
          location: europe-central2

      - name: Run orders PostgreSQL DR workflow
        run: |
          BACKUP_FILE="/tmp/orders-postgres-${{ github.run_id }}.dump"
          METADATA_FILE="/tmp/orders-postgres-dr.env"

          bash platform/disaster-recovery/orders-postgres-dr.sh \
            --action "${{ github.event.inputs.action }}" \
            --namespace "${{ github.event.inputs.namespace }}" \
            --validation-db "${{ github.event.inputs.validation_db }}" \
            --backup-file "${BACKUP_FILE}" \
            --metadata-output "${METADATA_FILE}"

      - name: Publish DR summary
        if: always()
        run: |
          if [ -f /tmp/orders-postgres-dr.env ]; then
            . /tmp/orders-postgres-dr.env
          fi

          echo "## Orders PostgreSQL DR Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \`${NAMESPACE:-${{ github.event.inputs.namespace }}}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: \`${ACTION:-${{ github.event.inputs.action }}}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PostgreSQL pod: \`${POD_NAME:-not-resolved}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source database: \`${DATABASE_NAME:-orders}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backup file: \`${BACKUP_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backup size: \`${BACKUP_SIZE_BYTES:-0}\` bytes" >> "$GITHUB_STEP_SUMMARY"

          if [ "${ACTION:-${{ github.event.inputs.action }}}" = "backup-and-restore" ]; then
            echo "- Validation database: \`${VALIDATION_DB:-${{ github.event.inputs.validation_db }}}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Restore verified: \`${RESTORE_VERIFIED:-false}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Restored schema tables: \`${TABLE_COUNT:-0}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Restored rows in \`orders\`: \`${ORDERS_COUNT:-0}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Restored rows in \`order_items\`: \`${ORDER_ITEMS_COUNT:-0}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Restored rows in \`shipping_addresses\`: \`${SHIPPING_ADDRESSES_COUNT:-0}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload DR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orders-postgres-dr-${{ github.run_id }}
          path: |
            /tmp/orders-postgres-*.dump
            /tmp/orders-postgres-dr.env
          retention-days: 14
