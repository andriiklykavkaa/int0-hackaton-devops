name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "src/catalog/**"
      - "src/ui/**"
      - "src/cart/**"
      - "src/orders/**"
      - "src/checkout/**"
      - ".github/workflows/ci.yaml"
  push:
    branches:
      - main
    paths:
      - "src/catalog/**"
      - "src/ui/**"
      - "src/cart/**"
      - "src/orders/**"
      - "src/checkout/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: write
  pull-requests: write

env:
  GCP_REGION: europe-central2
  GAR_HOST: europe-central2-docker.pkg.dev
  GCP_PROJECT_ID: ${{ secrets.PROJECT_ID }}
  GAR_REPO: retail-images-stage

jobs:
  build-and-scan:
    name: "Build & Scan — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, ui, cart, orders, checkout]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker (Buildx)
        uses: ./.github/actions/setup-docker

      - name: Compute image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::7}"
          REGISTRY="${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}"
          IMAGE="${REGISTRY}/retail-store-sample-${{ matrix.service }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUM="${{ github.event.number }}"
            echo "tags=${IMAGE}:${SHORT_SHA}-pr${PR_NUM}" >> $GITHUB_OUTPUT
            echo "primary_tag=${IMAGE}:${SHORT_SHA}-pr${PR_NUM}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE}:${SHORT_SHA},${IMAGE}:latest" >> $GITHUB_OUTPUT
            echo "primary_tag=${IMAGE}:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          fi

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build image
        run: |
          docker buildx build \
            --tag "${{ steps.tags.outputs.primary_tag }}" \
            --load \
            src/${{ matrix.service }}

      # Security scanning with Trivy
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Trivy vulnerability scan (table report)
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --output trivy-${{ matrix.service }}.txt \
            ${{ steps.tags.outputs.primary_tag }}

      # Post scan summary as PR comment so reviewers see it inline
      - name: Post Trivy report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('trivy-${{ matrix.service }}.txt', 'utf8');
            const body = `### Trivy Scan — \`${{ matrix.service }}\` (\`${{ steps.tags.outputs.short_sha }}\`)
            <details><summary>Click to expand vulnerability report</summary>

            \`\`\`
            ${report.slice(0, 60000)}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # Upload plain text report as artifact
      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}-${{ steps.tags.outputs.short_sha }}
          path: trivy-${{ matrix.service }}.txt
          retention-days: 30

      # Push image (only on merge to main)
      - name: Push image to Artifact Registry
        if: steps.tags.outputs.push == 'true'
        run: |
          # Push all tags (sha + latest)
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag "${{ steps.tags.outputs.primary_tag }}" "${tag}"
            docker push "${tag}"
          done

      # Update image tag in gitops/environments/stage
      - name: Update image tag in GitOps config
        if: steps.tags.outputs.push == 'true'
        run: |
          SHORT_SHA="${{ steps.tags.outputs.short_sha }}"
          SERVICE="${{ matrix.service }}"
          FILE="gitops/environments/stage/${SERVICE}-app.yaml"

          sed -i "s|value: .*  # CI updates this to git SHA on merge|value: ${SHORT_SHA}   # CI updates this to git SHA on merge|" "${FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${FILE}"
          git diff --cached --quiet || git commit -m "chore(gitops): update ${SERVICE} image to ${SHORT_SHA} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Job summary
        run: |
          echo "## CI Result — ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.tags.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ steps.tags.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | \`${{ steps.tags.outputs.push }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy report | see artifacts |" >> $GITHUB_STEP_SUMMARY
