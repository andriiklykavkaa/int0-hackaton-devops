apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: retail-store-require-resource-requests
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-resource-requests
      match:
        any:
          - resources:
              kinds:
                - Pod
              selector:
                matchLabels:
                  app.kubernetes.io/owner: retail-store-sample
                  app.kubernetes.io/component: service
      validate:
        message: "Retail Store service pods must define CPU and memory requests plus a memory limit."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    memory: "?*"
