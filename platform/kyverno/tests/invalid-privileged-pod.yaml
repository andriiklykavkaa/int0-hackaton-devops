apiVersion: v1
kind: Pod
metadata:
  name: invalid-privileged-pod
  labels:
    app.kubernetes.io/name: invalid-privileged-pod
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: retail-store-sample
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: nginx:1.27.4
      securityContext:
        privileged: true
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
