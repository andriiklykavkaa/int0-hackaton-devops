apiVersion: v1
kind: Pod
metadata:
  name: invalid-security-pod
  labels:
    app.kubernetes.io/name: invalid-security-pod
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: retail-store-sample
spec:
  containers:
    - name: app
      image: nginx:1.27.4
      securityContext:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
