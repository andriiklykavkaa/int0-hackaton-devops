apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-redis-exporter
  namespace: retail-store-stage
  labels:
    app.kubernetes.io/name: retail-store-redis-exporter
    app.kubernetes.io/part-of: retail-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retail-store-redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retail-store-redis-exporter
        app.kubernetes.io/part-of: retail-store
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 59000
        runAsGroup: 59000
        fsGroup: 59000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.80.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - --redis.addr=redis://__REDIS_SERVICE__.__APP_NAMESPACE__.svc.cluster.local:6379
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: retail-store-redis-exporter
  namespace: retail-store-stage
  labels:
    app.kubernetes.io/name: retail-store-redis-exporter
    app.kubernetes.io/part-of: retail-store
spec:
  selector:
    app.kubernetes.io/name: retail-store-redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: retail-store-redis-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: retail-store
spec:
  namespaceSelector:
    matchNames:
      - retail-store-stage
  selector:
    matchLabels:
      app.kubernetes.io/name: retail-store-redis-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
