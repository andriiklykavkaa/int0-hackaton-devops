apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-postgres-exporter
  namespace: retail-store-stage
  labels:
    app.kubernetes.io/name: retail-store-postgres-exporter
    app.kubernetes.io/part-of: retail-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retail-store-postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retail-store-postgres-exporter
        app.kubernetes.io/part-of: retail-store
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.18.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: DATA_SOURCE_URI
              value: __POSTGRES_SERVICE__.__APP_NAMESPACE__.svc.cluster.local:5432/orders?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: orders-db
                  key: RETAIL_ORDERS_PERSISTENCE_USERNAME
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: orders-db
                  key: RETAIL_ORDERS_PERSISTENCE_PASSWORD
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: retail-store-postgres-exporter
  namespace: retail-store-stage
  labels:
    app.kubernetes.io/name: retail-store-postgres-exporter
    app.kubernetes.io/part-of: retail-store
spec:
  selector:
    app.kubernetes.io/name: retail-store-postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: retail-store-postgres-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: retail-store
spec:
  namespaceSelector:
    matchNames:
      - retail-store-stage
  selector:
    matchLabels:
      app.kubernetes.io/name: retail-store-postgres-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
