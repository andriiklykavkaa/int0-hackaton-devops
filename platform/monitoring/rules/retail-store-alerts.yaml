apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: retail-store-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: retail-store
spec:
  groups:
    - name: retail-store.application
      rules:
        - record: retail:http_request_rate5m
          expr: |
            (
              sum by (application) (
                rate(http_server_requests_seconds_count{namespace="retail-store-stage",application=~"cart|orders|ui"}[5m])
              )
            )
            or
            (
              sum by (application) (
                rate(retail_http_requests_total{namespace="retail-store-stage",application=~"catalog|checkout"}[5m])
              )
            )
        - record: retail:http_error_rate5m
          expr: |
            (
              sum by (application) (
                rate(http_server_requests_seconds_count{namespace="retail-store-stage",application=~"cart|orders|ui",status=~"5.."}[5m])
              )
              /
              clamp_min(
                sum by (application) (
                  rate(http_server_requests_seconds_count{namespace="retail-store-stage",application=~"cart|orders|ui"}[5m])
                ),
                0.001
              )
            )
            or
            (
              sum by (application) (
                rate(retail_http_requests_total{namespace="retail-store-stage",application=~"catalog|checkout",status=~"5.."}[5m])
              )
              /
              clamp_min(
                sum by (application) (
                  rate(retail_http_requests_total{namespace="retail-store-stage",application=~"catalog|checkout"}[5m])
                ),
                0.001
              )
            )
        - record: retail:http_latency_p95_seconds5m
          expr: |
            histogram_quantile(
              0.95,
              (
                sum by (application, le) (
                  rate(http_server_requests_seconds_bucket{namespace="retail-store-stage",application=~"cart|orders|ui"}[5m])
                )
              )
              or
              (
                sum by (application, le) (
                  rate(retail_http_request_duration_seconds_bucket{namespace="retail-store-stage",application=~"catalog|checkout"}[5m])
                )
              )
            )
        - alert: RetailStoreHighErrorRate
          expr: |
            retail:http_error_rate5m > 0.01
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on {{ $labels.application }}"
            description: "Error rate exceeded 1% for {{ $labels.application }} in retail-store-stage."
        - alert: RetailStoreHighLatencyP95
          expr: |
            retail:http_latency_p95_seconds5m > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High p95 latency on {{ $labels.application }}"
            description: "p95 latency exceeded 500ms for {{ $labels.application }} in retail-store-stage."
        - alert: RetailStoreTargetDown
          expr: |
            min by (job) (
              up{namespace="retail-store-stage"}
            ) == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus target down for {{ $labels.job }}"
            description: "A scraped Retail Store target has been down for more than 2 minutes."
        - alert: RetailStoreHighCPUThrottling
          expr: |
            sum by (pod) (
              rate(container_cpu_cfs_throttled_periods_total{namespace="retail-store-stage",container!=""}[5m])
            )
            /
            clamp_min(
              sum by (pod) (
                rate(container_cpu_cfs_periods_total{namespace="retail-store-stage",container!=""}[5m])
              ),
              0.001
            ) > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU throttling on {{ $labels.pod }}"
            description: "CPU throttling ratio exceeded 20% for {{ $labels.pod }}."
        - alert: RetailStorePodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="retail-store-stage"}[15m]) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting frequently"
            description: "{{ $labels.pod }} restarted more than twice in 15 minutes."
        - alert: RetailStoreMySQLExporterDown
          expr: |
            mysql_up{namespace="retail-store-stage"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "MySQL exporter target down"
            description: "MySQL metrics exporter cannot reach the database."
        - alert: RetailStorePostgresExporterDown
          expr: |
            pg_up{namespace="retail-store-stage"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL exporter target down"
            description: "PostgreSQL metrics exporter cannot reach the database."
        - alert: RetailStoreRedisExporterDown
          expr: |
            redis_up{namespace="retail-store-stage"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Redis exporter target down"
            description: "Redis metrics exporter cannot reach the cache."
        - alert: RetailStoreRabbitMQQueueBacklogHigh
          expr: |
            sum(rabbitmq_queue_messages_ready{namespace="retail-store-stage"}) > 100
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RabbitMQ backlog is growing"
            description: "RabbitMQ has more than 100 ready messages waiting for consumers."
