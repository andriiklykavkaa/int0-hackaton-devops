apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-store-platform-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: retail-store
data:
  retail-store-platform.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"retail-store-stage\",container!=\"\",image!=\"\"}[5m])) / clamp_min(sum by (pod) (kube_pod_container_resource_requests{namespace=\"retail-store-stage\",resource=\"cpu\",unit=\"core\"}), 0.001)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "CPU Utilization vs Requests",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"retail-store-stage\",container!=\"\",image!=\"\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Memory Working Set",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_cfs_throttled_periods_total{namespace=\"retail-store-stage\",container!=\"\"}[5m])) / clamp_min(sum by (pod) (rate(container_cpu_cfs_periods_total{namespace=\"retail-store-stage\",container!=\"\"}[5m])), 0.001)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "CPU Throttling Ratio",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"retail-store-stage\"}[15m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Pod Restarts (15m)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "targets": [
            {
              "expr": "sum(mysql_global_status_threads_connected)",
              "legendFormat": "mysql connections",
              "refId": "A"
            },
            {
              "expr": "sum(pg_stat_database_numbackends)",
              "legendFormat": "postgres connections",
              "refId": "B"
            },
            {
              "expr": "sum(redis_connected_clients)",
              "legendFormat": "redis clients",
              "refId": "C"
            }
          ],
          "title": "DB / Cache Connections",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 6,
          "targets": [
            {
              "expr": "sum(redis_keyspace_hits_total) / clamp_min(sum(redis_keyspace_hits_total) + sum(redis_keyspace_misses_total), 0.001)",
              "legendFormat": "redis cache hit ratio",
              "refId": "A"
            }
          ],
          "title": "Cache Hit Ratio",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "id": 7,
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_ready)",
              "legendFormat": "ready messages",
              "refId": "A"
            },
            {
              "expr": "sum(rabbitmq_queue_messages_unacked)",
              "legendFormat": "unacked messages",
              "refId": "B"
            }
          ],
          "title": "RabbitMQ Queue Depth",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 24
          },
          "id": 8,
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_consumers)",
              "legendFormat": "queue consumers",
              "refId": "A"
            }
          ],
          "title": "RabbitMQ Consumers",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "binBps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 32
          },
          "id": 9,
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"retail-store-stage\",pod!=\"\"}[5m]))",
              "legendFormat": "{{pod}} rx",
              "refId": "A"
            },
            {
              "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"retail-store-stage\",pod!=\"\"}[5m]))",
              "legendFormat": "{{pod}} tx",
              "refId": "B"
            }
          ],
          "title": "Pod Network Traffic",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 32
          },
          "id": 10,
          "targets": [
            {
              "expr": "(node_filesystem_size_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"} - node_filesystem_avail_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"}) / clamp_min(node_filesystem_size_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"}, 1)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Node Root Disk Usage",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "retail-store",
        "platform"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timezone": "",
      "title": "Retail Store Platform",
      "version": 1
    }
